<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CoinFlow — real vaqtda kurslar</title>
<link rel="stylesheet" href="style.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121729">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoinFlow">
</head>
<body>

<!-- ============ KIRISH / RO'YXATDAN O'TISH EKRANI ============ -->
<div class="auth-screen" id="authScreen">
  <div class="auth-card glass-card">
    <div class="auth-brand">
      <div class="brand-mark">💲</div>
      <div class="title">CoinFlow</div>
    </div>

    <!-- LOGIN VIEW -->
    <div class="auth-view active" id="authLoginView">
      <a href="#" class="auth-switch-link" id="showRegisterLink">Ro'yxatdan o'tish</a>

      <form id="loginForm" autocomplete="off">
        <div class="simple-field">
          <label>Login</label>
          <input type="text" id="loginLogin" placeholder="login">
        </div>
        <div class="simple-field">
          <label>Parol</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <div class="auth-error" id="loginError"></div>
        <button type="button" class="auth-delete-btn" id="deleteProfileBtn">Profilni o'chirish</button>
        <button type="submit" class="auth-submit-btn">Kirish</button>
      </form>
    </div>

    <!-- REGISTER VIEW -->
    <div class="auth-view" id="authRegisterView">
      <a href="#" class="auth-switch-link" id="showLoginLink">Kirish</a>

      <form id="registerForm" autocomplete="off">
        <div class="simple-field">
          <label>Ism</label>
          <input type="text" id="regIsm" placeholder="Ismingiz">
        </div>
        <div class="simple-field">
          <label>Familiya</label>
          <input type="text" id="regFamiliya" placeholder="Familiyangiz">
        </div>
        <div class="simple-field">
          <label>Login</label>
          <input type="text" id="regLogin" placeholder="raqam bilan boshlanmasin">
        </div>
        <div class="simple-field">
          <label>Parol</label>
          <input type="password" id="regPassword" placeholder="kamida 8 ta belgi, harf+raqam">
        </div>
        <div class="simple-field">
          <label>Parolni tasdiqlang</label>
          <input type="password" id="regPassword2" placeholder="parolni qayta yozing">
        </div>
        <div class="auth-error" id="registerError"></div>
        <button type="submit" class="auth-submit-btn">Ro'yxatdan o'tish</button>
      </form>
    </div>
  </div>
</div>

<div class="page-wrap" id="pageWrap" style="display:none;">

  <!-- Desktop sidebar (kompyuter uchun) -->
  <div class="sidebar-nav">
    <div class="sidebar-brand">
      <div class="brand-mark" id="brandMarkSide">💲</div>
      <div class="brand-text">
        <div class="title" id="brandTitleSide">CoinFlow</div>
        <div class="subtitle" id="headerDateSide">Yuklanmoqda...</div>
      </div>
    </div>
    <button class="sidebar-btn active" data-tab="asosiy">
      <span class="nav-icon">🏠</span> Asosiy
    </button>
    <button class="sidebar-btn" data-tab="tarix">
      <span class="nav-icon">🕓</span> Tarix
    </button>
    <button class="sidebar-btn" data-tab="koproq">
      <span class="nav-icon">🧩</span> Ko'proq
    </button>
    <button class="sidebar-btn" data-tab="profil">
      <span class="nav-icon">👤</span> Profil
    </button>
    <button class="sidebar-btn" id="logoutBtnSide">
      <span class="nav-icon">🚪</span> Chiqish
    </button>
  </div>

<div class="app-shell">

  <!-- Header (mobil uchun) -->
  <div class="app-header">
    <div class="brand">
      <div class="brand-mark" id="brandMarkMobile">💲</div>
      <div class="brand-text">
        <div class="title" id="brandTitleMobile">CoinFlow</div>
        <div class="subtitle" id="headerDate">Yuklanmoqda...</div>
      </div>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="header-icon-btn" id="logoutBtn" title="Chiqish">🚪</button>
      <button class="header-icon-btn" id="editRowsBtn" title="Tahrirlash">✎</button>
    </div>
  </div>

  <!-- ============ TAB 1: ASOSIY ============ -->
  <div class="tab-panel active" id="tab-asosiy">
    <div class="rows-header">
      <h2>Valyuta kalkulyatori</h2>
      <button class="add-row-btn" id="addRowBtn">+</button>
    </div>

    <div class="currency-rows" id="currencyRows"></div>

    <div class="source-note" id="sourceNote">Valyuta kurslari yuklanmoqda...</div>

    <div class="keypad" id="keypad">
      <button class="key" data-key="7">7</button>
      <button class="key" data-key="8">8</button>
      <button class="key" data-key="9">9</button>
      <button class="key key-ac" data-key="AC">AC</button>
      <button class="key" data-key="4">4</button>
      <button class="key" data-key="5">5</button>
      <button class="key" data-key="6">6</button>
      <button class="key" data-key="1">1</button>
      <button class="key" data-key="2">2</button>
      <button class="key" data-key="3">3</button>
      <button class="key key-back" data-key="BACK">⌫</button>
      <button class="key key-zero" data-key="0">0</button>
      <button class="key" data-key=",">,</button>
    </div>
  </div>

  <!-- ============ TAB 2: TARIX ============ -->
  <div class="tab-panel" id="tab-tarix">
    <div class="rows-header">
      <h2>Amallar tarixi</h2>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- ============ TAB 3: KO'PROQ ============ -->
  <div class="tab-panel" id="tab-koproq">

    <div id="toolsHome">
      <div class="rows-header">
        <h2>Qo'shimcha vositalar</h2>
      </div>
      <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <!-- Tool detail views injected here -->
    <div id="toolViews"></div>
  </div>

  <!-- ============ TAB 4: PROFIL ============ -->
  <div class="tab-panel" id="tab-profil">
    <div class="rows-header">
      <h2>Profil</h2>
    </div>

    <div class="profile-card glass-card">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatarPreview"></div>
        <label class="profile-avatar-edit" for="profileAvatarInput">📷</label>
        <input type="file" id="profileAvatarInput" accept="image/*" style="display:none;">
      </div>

      <div class="simple-field">
        <label>Ism</label>
        <input type="text" id="profileIsmInput">
      </div>
      <div class="simple-field">
        <label>Familiya</label>
        <input type="text" id="profileFamiliyaInput">
      </div>
      <div class="simple-field">
        <label>Login</label>
        <input type="text" id="profileLoginDisplay" disabled>
      </div>

      <div class="auth-error" id="profileError"></div>
      <div class="auth-success" id="profileSuccess"></div>
      <button class="auth-submit-btn" id="profileSaveBtn">Saqlash</button>
    </div>
  </div>

  <!-- Bottom navigation -->
  <div class="bottom-nav">
    <button class="nav-btn active" data-tab="asosiy">
      <span class="nav-icon">🏠</span>Asosiy
    </button>
    <button class="nav-btn" data-tab="tarix">
      <span class="nav-icon">🕓</span>Tarix
    </button>
    <button class="nav-btn" data-tab="koproq">
      <span class="nav-icon">🧩</span>Ko'proq
    </button>
    <button class="nav-btn" data-tab="profil">
      <span class="nav-icon">👤</span>Profil
    </button>
  </div>

</div>

</div>
<!-- /page-wrap -->

<!-- Currency picker modal -->
<div class="modal-overlay" id="pickerOverlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Valyutani tanlang</div>
    <input type="text" class="modal-search" id="pickerSearch" placeholder="Qidirish: nomi yoki kodi (masalan EUR)">
    <div class="modal-list" id="pickerList"></div>
    <button class="modal-cancel" id="pickerCancel">Bekor qilish</button>
  </div>
</div>

<script src="currencies.js"></script>
<script src="units.js"></script>
<script src="app.js"></script>
<script src="auth.js"></script>
</body>
</html>
